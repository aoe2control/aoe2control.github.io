site_name: AoE2Control Documentation
site_url: https://aoe2control.github.io/
site_description: "Documentation for AoE2Control, a Lua scripting engine for Age of Empires II: Definitive Edition with game-state access, commands, rendering, and IPC."
copyright: Copyright © Big John
theme:
  name: material
  custom_dir: overrides
  palette:
    scheme: slate
    primary: black
    accent: deep blue
  features:
    - navigation.tabs
    - navigation.expand
    - search.suggest
    - search.highlight
    - toc.integrate
    - content.code.copy
  logo: assets/logo.png
  favicon: assets/logo.png

docs_dir: docs

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - tables
  - admonition
  - pymdownx.details

extra:
  discord: "https://discord.gg/DENDVuWq5t"
  version: "1.0"
  generator: false
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/DENDVuWq5t
      name: Discord
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UCUW6Vl6RPbAJfej4yb7Gnuw
      name: YouTube

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - getting-started.md
    - quick-example.md
  - Interface & Configuration:
    - interface-options.md
    - config-location.md
  - Scripting Fundamentals:
    - lifecycle.md
    - module-system.md
  - Game API:
    - commands.md
    - facts.md
  - Render API: render-api.md
  - Types & Enums:
    - types.md
    - enums.md
  - Advanced APIs:
    - settings-api.md
    - render-api-impl.md
    - ipc-api.md
  - Reference:
    - ai-agent-reference.md
    - limits.md
    - distribution.md
    - community.md
    - YouTube Channel: https://www.youtube.com/channel/UCUW6Vl6RPbAJfej4yb7Gnuw
  - Discord: https://discord.gg/DENDVuWq5t
