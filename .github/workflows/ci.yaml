name: Deploy MkDocs
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install "mkdocs==1.6.1" "mkdocs-material==9.7.4" "pymdown-extensions==10.21" "Markdown==3.10" "Pygments==2.19.2"
      - run: python -m pip show mkdocs mkdocs-material pymdown-extensions Markdown Pygments
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
